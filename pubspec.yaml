name: release_ready_flutter_app
description: "A release-ready Flutter application for mothers and child care."
publish_to: 'none'

# Academic release versioning:
# version name = 1.0.0, build number = 1.
# Android maps these to versionName and versionCode.
# iOS maps these to CFBundleShortVersionString and CFBundleVersion.
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  http: ^1.2.2
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.1
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/data/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/logo.png
  adaptive_icon_background: "#F6BFC8"
  adaptive_icon_foreground: assets/logo.png
  min_sdk_android: 21

flutter_native_splash:
  color: "#FFF7F8"
  image: assets/logo.png
  android: true
  ios: true
  web: false
  android_12:
    color: "#FFF7F8"
    image: assets/logo.png
